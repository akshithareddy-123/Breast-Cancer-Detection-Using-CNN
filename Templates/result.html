<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f9fc;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .result-container {
            background-color: white;
            display: inline-block;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 600px;
        }

        .result-container p {
            font-size: 20px;
            margin: 15px 0;
        }

        .highlight {
            font-weight: bold;
            color: #e74c3c;
        }

        .benign {
            color: #27ae60;
        }

        img {
            margin-top: 20px;
            max-width: 300px;
            border: 3px solid #333;
            border-radius: 12px;
        }

        a {
            margin-top: 30px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #2980b9;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        a:hover {
            background-color: #1f618d;
        }
    </style>
</head>
<body>

    <h1>Breast Cancer Detection Result</h1>

    <div class="result-container">
        <p><strong>Prediction:</strong>
            <span class="{{ 'highlight' if prediction == 'Malignant' else 'benign' }}">
                {{ prediction }}
            </span>
        </p>

        <p><strong>Cancer Stage:</strong> {{ stage }}</p>

        <p><strong>Estimated Survival Rate:</strong> {{ survival_rate }}</p>

        <img src="{{ url_for('static', filename='uploads/' + filename) }}" alt="Uploaded Image">

        <br>
        <a href="{{ url_for('index') }}">Go Back</a>
    </div>

</body>
</html>
